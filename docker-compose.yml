services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smithers
      POSTGRES_PASSWORD: smithers
      POSTGRES_DB: vercel_example
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smithers -d vercel_example"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
