name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smithers
          POSTGRES_PASSWORD: smithers
          POSTGRES_DB: vercel_example
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U smithers -d vercel_example"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://smithers:smithers@localhost:5432/vercel_example
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test:coverage

  smithers-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun install
        working-directory: .smithers
      - run: bunx tsc -p .smithers/tsconfig.json --noEmit
